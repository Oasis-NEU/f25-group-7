name: Daily Menu Scrape

# Triggers the Vercel scrape endpoint which runs from Vercel's IPs (not blocked by DineOnCampus).
# Vercel also has its own cron at 0 8 * * * as a backup (vercel.json).

on:
  schedule:
    - cron: '0 5 * * *'    # midnight ET — primary
    - cron: '0 7 * * *'    # 2-3 AM ET  — backup before breakfast
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel scrape
        run: |
          curl -f -X POST https://nu-dining.vercel.app/api/scrape \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
