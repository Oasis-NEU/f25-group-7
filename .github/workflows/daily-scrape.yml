name: Daily Menu Scrape

# DineOnCampus posts the next day's menus around 11 PM–midnight ET.
# We run twice:
#   1. 5:00 AM UTC = midnight/1 AM ET  → primary scrape, catches menus posted overnight
#   2. 11:00 AM UTC = 6/7 AM ET        → backup, catches any late updates before breakfast opens
# The scraper is a no-op if data for today already exists, so both runs are cheap.

on:
  schedule:
    - cron: '0 5 * * *'    # midnight ET — primary
    - cron: '0 11 * * *'   # 6 AM ET   — backup before breakfast
  workflow_dispatch:         # manual trigger from GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-folder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend-folder/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Chromium (for Puppeteer)
        run: npx puppeteer browsers install chrome

      - name: Run menu scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # puppeteer auto-detects the installed chrome, no path needed
        run: node run-scrape.js
