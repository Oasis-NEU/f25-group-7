name: Daily Menu Scrape

# NOTE: Scheduled runs are disabled — DineOnCampus blocks all cloud/datacenter IPs
# (GitHub Actions, Vercel) via Cloudflare. The scraper must run from a residential
# IP. Use the local cron instead:
#   crontab -e  →  0 1 * * * cd /path/to/f25-group-7/backend-folder && node run-scrape.js >> /tmp/scrape.log 2>&1
#
# This workflow is kept for manual one-off runs via the GitHub Actions UI.

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-folder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend-folder/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Install Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Run menu scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node run-scrape.js
